services:
  - type: web
    name: academic-platform-backend
    env: python
    rootDir: server
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./student_platform_final.db
      - key: SECRET_KEY
        value: supersecretkey123render
